name: FE CI

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'fe/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: fe/package-lock.json

      - name: Install dependencies
        working-directory: fe
        run: npm ci

      - name: Lint
        working-directory: fe
        run: npm run lint

      - name: Build
        working-directory: fe
        run: npm run build
