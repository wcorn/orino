databaseChangeLog:
  - changeSet:
      id: 008-create-todo
      author: wcorn
      preConditions:
        - onFail: MARK_RAN
        - not:
            - tableExists:
                tableName: todo
      changes:
        - createTable:
            tableName: todo
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: member_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_todo_member
                    references: member(id)
              - column:
                  name: title
                  type: VARCHAR(200)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: TEXT
              - column:
                  name: category_id
                  type: BIGINT
                  constraints:
                    foreignKeyName: fk_todo_category
                    references: category(id)
              - column:
                  name: goal_id
                  type: BIGINT
                  constraints:
                    foreignKeyName: fk_todo_goal
                    references: goal(id)
              - column:
                  name: priority
                  type: VARCHAR(10)
                  defaultValue: MEDIUM
                  constraints:
                    nullable: false
              - column:
                  name: deadline
                  type: DATE
              - column:
                  name: estimated_minutes
                  type: INT
              - column:
                  name: status
                  type: VARCHAR(10)
                  defaultValue: PENDING
                  constraints:
                    nullable: false
              - column:
                  name: completed_at
                  type: DATETIME(6)
              - column:
                  name: created_at
                  type: DATETIME(6)
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: DATETIME(6)
                  constraints:
                    nullable: false
