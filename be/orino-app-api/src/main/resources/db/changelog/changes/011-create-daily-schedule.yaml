databaseChangeLog:
  - changeSet:
      id: 011-create-daily-schedule
      author: wcorn
      preConditions:
        - onFail: MARK_RAN
        - not:
            - tableExists:
                tableName: daily_schedule
      changes:
        - createTable:
            tableName: daily_schedule
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: member_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_daily_schedule_member
                    references: member(id)
              - column:
                  name: schedule_date
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: is_dirty
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
              - column:
                  name: generated_at
                  type: DATETIME(6)
              - column:
                  name: total_blocks
                  type: INT
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: completed_blocks
                  type: INT
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: DATETIME(6)
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: DATETIME(6)
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: daily_schedule
            columnNames: member_id, schedule_date
            constraintName: uk_daily_schedule_member_date

  - changeSet:
      id: 011-create-schedule-block
      author: wcorn
      preConditions:
        - onFail: MARK_RAN
        - not:
            - tableExists:
                tableName: schedule_block
      changes:
        - createTable:
            tableName: schedule_block
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: daily_schedule_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_schedule_block_daily_schedule
                    references: daily_schedule(id)
              - column:
                  name: block_type
                  type: VARCHAR(15)
                  constraints:
                    nullable: false
              - column:
                  name: reference_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: start_time
                  type: TIME
                  constraints:
                    nullable: false
              - column:
                  name: end_time
                  type: TIME
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(10)
                  defaultValue: SCHEDULED
                  constraints:
                    nullable: false
              - column:
                  name: is_pinned
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: completed_at
                  type: DATETIME(6)
              - column:
                  name: sort_order
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: DATETIME(6)
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: DATETIME(6)
                  constraints:
                    nullable: false
