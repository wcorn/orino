databaseChangeLog:
  - changeSet:
      id: 015-drop-planner-tables
      author: wcorn
      comment: |
        Study Planner Phase 1 백지화 (#321). 002~014에서 생성한 planner 관련 테이블을
        역순(자식 → 부모)으로 drop. member/auth 관련(001) 테이블은 유지.
