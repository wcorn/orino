databaseChangeLog:
  - changeSet:
      id: 004-create-priority-rule
      author: wcorn
      preConditions:
        - onFail: MARK_RAN
        - not:
            - tableExists:
                tableName: priority_rule
      changes:
        - createTable:
            tableName: priority_rule
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: member_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_priority_rule_member
                    references: member(id)
              - column:
                  name: item_type
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: sort_order
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: DATETIME(6)
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: DATETIME(6)
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: priority_rule
            columnNames: member_id, item_type
            constraintName: uk_priority_rule_member_type
