databaseChangeLog:
  - changeSet:
      id: 007-create-routine
      author: wcorn
      preConditions:
        - onFail: MARK_RAN
        - not:
            - tableExists:
                tableName: routine
      changes:
        - createTable:
            tableName: routine
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: member_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_routine_member
                    references: member(id)
              - column:
                  name: title
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: category_id
                  type: BIGINT
                  constraints:
                    foreignKeyName: fk_routine_category
                    references: category(id)
              - column:
                  name: duration_minutes
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: preferred_time
                  type: TIME
              - column:
                  name: recurrence_type
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: recurrence_interval
                  type: INT
              - column:
                  name: recurrence_days
                  type: VARCHAR(50)
              - column:
                  name: start_date
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: end_date
                  type: DATE
              - column:
                  name: skip_holidays
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(10)
                  defaultValue: ACTIVE
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: DATETIME(6)
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: DATETIME(6)
                  constraints:
                    nullable: false

  - changeSet:
      id: 007-create-routine-check
      author: wcorn
      preConditions:
        - onFail: MARK_RAN
        - not:
            - tableExists:
                tableName: routine_check
      changes:
        - createTable:
            tableName: routine_check
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: routine_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_routine_check_routine
                    references: routine(id)
              - column:
                  name: check_date
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: completed
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: DATETIME(6)
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: routine_check
            columnNames: routine_id, check_date
            constraintName: uk_routine_check_routine_date

  - changeSet:
      id: 007-create-routine-exception
      author: wcorn
      preConditions:
        - onFail: MARK_RAN
        - not:
            - tableExists:
                tableName: routine_exception
      changes:
        - createTable:
            tableName: routine_exception
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: routine_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_routine_exception_routine
                    references: routine(id)
              - column:
                  name: exception_date
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: DATETIME(6)
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: routine_exception
            columnNames: routine_id, exception_date
            constraintName: uk_routine_exception_routine_date
