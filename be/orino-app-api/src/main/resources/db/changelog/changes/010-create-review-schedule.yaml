databaseChangeLog:
  - changeSet:
      id: 010-create-review-schedule
      author: wcorn
      preConditions:
        - onFail: MARK_RAN
        - not:
            - tableExists:
                tableName: review_schedule
      changes:
        - createTable:
            tableName: review_schedule
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: study_unit_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_review_schedule_study_unit
                    references: study_unit(id)
              - column:
                  name: sequence
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: scheduled_date
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(10)
                  defaultValue: PENDING
                  constraints:
                    nullable: false
              - column:
                  name: difficulty_feedback
                  type: VARCHAR(10)
              - column:
                  name: completed_at
                  type: DATETIME(6)
              - column:
                  name: created_at
                  type: DATETIME(6)
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: DATETIME(6)
                  constraints:
                    nullable: false
