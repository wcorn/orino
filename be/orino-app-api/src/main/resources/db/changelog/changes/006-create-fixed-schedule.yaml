databaseChangeLog:
  - changeSet:
      id: 006-create-fixed-schedule
      author: wcorn
      preConditions:
        - onFail: MARK_RAN
        - not:
            - tableExists:
                tableName: fixed_schedule
      changes:
        - createTable:
            tableName: fixed_schedule
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: member_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_fixed_schedule_member
                    references: member(id)
              - column:
                  name: title
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: category_id
                  type: BIGINT
                  constraints:
                    foreignKeyName: fk_fixed_schedule_category
                    references: category(id)
              - column:
                  name: start_time
                  type: TIME
                  constraints:
                    nullable: false
              - column:
                  name: end_time
                  type: TIME
                  constraints:
                    nullable: false
              - column:
                  name: schedule_date
                  type: DATE
              - column:
                  name: recurrence_type
                  type: VARCHAR(20)
                  defaultValue: NONE
                  constraints:
                    nullable: false
              - column:
                  name: recurrence_interval
                  type: INT
              - column:
                  name: recurrence_days
                  type: VARCHAR(50)
              - column:
                  name: recurrence_start
                  type: DATE
              - column:
                  name: recurrence_end
                  type: DATE
              - column:
                  name: created_at
                  type: DATETIME(6)
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: DATETIME(6)
                  constraints:
                    nullable: false
