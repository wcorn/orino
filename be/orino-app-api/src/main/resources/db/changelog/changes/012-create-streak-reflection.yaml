databaseChangeLog:
  - changeSet:
      id: 012-create-streak
      author: wcorn
      preConditions:
        - onFail: MARK_RAN
        - not:
            - tableExists:
                tableName: streak
      changes:
        - createTable:
            tableName: streak
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: member_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_streak_member
                    references: member(id)
              - column:
                  name: streak_type
                  type: VARCHAR(10)
                  constraints:
                    nullable: false
              - column:
                  name: routine_id
                  type: BIGINT
                  constraints:
                    foreignKeyName: fk_streak_routine
                    references: routine(id)
              - column:
                  name: current_count
                  type: INT
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: longest_count
                  type: INT
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: last_achieved_date
                  type: DATE
              - column:
                  name: freeze_used_this_month
                  type: INT
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: DATETIME(6)
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: DATETIME(6)
                  constraints:
                    nullable: false

  - changeSet:
      id: 012-create-daily-reflection
      author: wcorn
      preConditions:
        - onFail: MARK_RAN
        - not:
            - tableExists:
                tableName: daily_reflection
      changes:
        - createTable:
            tableName: daily_reflection
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: member_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_daily_reflection_member
                    references: member(id)
              - column:
                  name: reflection_date
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: memo
                  type: TEXT
              - column:
                  name: mood
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: DATETIME(6)
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: DATETIME(6)
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: daily_reflection
            columnNames: member_id, reflection_date
            constraintName: uk_daily_reflection_member_date
