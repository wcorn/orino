spring:
  application:
    name: orino-batch
  profiles:
    include:
      - mysql
      - actuator

server:
  port: 8081

batch:
  consecutive-missed-days:
    cron: "0 0 9 * * *"
    zone: Asia/Seoul
    threshold-days: 3
    achievement-rate-threshold: 50

management:
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:1.0}
  otlp:
    metrics:
      export:
        enabled: false
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/traces
