apiVersion: v1
kind: Service
metadata:
  name: thanos-storegateway
  labels:
    app.kubernetes.io/name: thanos
    app.kubernetes.io/component: storegateway
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: http
      port: 9090
      targetPort: http
    - name: grpc
      port: 10901
      targetPort: grpc
  selector:
    app.kubernetes.io/name: thanos
    app.kubernetes.io/component: storegateway
