apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: thanos-compactor
  labels:
    app.kubernetes.io/name: thanos
    app.kubernetes.io/component: compactor
spec:
  replicas: 1
  serviceName: thanos-compactor
  selector:
    matchLabels:
      app.kubernetes.io/name: thanos
      app.kubernetes.io/component: compactor
  template:
    metadata:
      labels:
        app.kubernetes.io/name: thanos
        app.kubernetes.io/component: compactor
    spec:
      securityContext:
        fsGroup: 1001
      containers:
        - name: thanos-compactor
          image: {{ .Values.image.registry }}/{{ .Values.image.repository }}:{{ .Values.image.tag }}
          args:
            - compact
            - --data-dir=/var/thanos/compact
            - --objstore.config-file=/etc/thanos/objstore.yml
            - --http-address=0.0.0.0:9090
            - --retention.resolution-raw={{ .Values.compactor.retentionRaw }}
            - --retention.resolution-5m={{ .Values.compactor.retention5m }}
            - --retention.resolution-1h={{ .Values.compactor.retention1h }}
            - --wait
          ports:
            - name: http
              containerPort: 9090
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: http
          readinessProbe:
            httpGet:
              path: /-/ready
              port: http
          volumeMounts:
            - name: data
              mountPath: /var/thanos/compact
            - name: objstore-config
              mountPath: /etc/thanos
          resources:
            {{- toYaml .Values.compactor.resources | nindent 12 }}
      volumes:
        - name: objstore-config
          secret:
            secretName: {{ .Values.objstoreSecret }}
  volumeClaimTemplates:
    - apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: {{ .Values.compactor.storageClass }}
        volumeMode: Filesystem
        resources:
          requests:
            storage: {{ .Values.compactor.storageSize }}
