apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-notifications-cm
  namespace: argocd
data:
  service.webhook.discord: |
    url: $discord-webhook-url
    headers:
      - name: Content-Type
        value: application/json

  template.app-sync-running: |
    webhook:
      discord:
        method: POST
        body: |
          {
            "embeds": [{{ "{" }}
              "title": ":arrows_counterclockwise: {{ "{{" }}.app.metadata.name{{ "}}" }} 배포 시작",
              "description": "Revision: {{ "{{" }}.app.status.sync.revision | trunc 7{{ "}}" }}",
              "color": 16776960
            {{ "}" }}]
          }

  template.app-sync-succeeded: |
    webhook:
      discord:
        method: POST
        body: |
          {
            "embeds": [{{ "{" }}
              "title": ":white_check_mark: {{ "{{" }}.app.metadata.name{{ "}}" }} 배포 완료",
              "description": "Revision: {{ "{{" }}.app.status.sync.revision | trunc 7{{ "}}" }}",
              "color": 65280
            {{ "}" }}]
          }

  template.app-sync-failed: |
    webhook:
      discord:
        method: POST
        body: |
          {
            "embeds": [{{ "{" }}
              "title": ":x: {{ "{{" }}.app.metadata.name{{ "}}" }} 배포 실패",
              "description": "{{ "{{" }}.app.status.operationState.message{{ "}}" }}",
              "color": 16711680
            {{ "}" }}]
          }

  template.app-health-degraded: |
    webhook:
      discord:
        method: POST
        body: |
          {
            "embeds": [{{ "{" }}
              "title": ":warning: {{ "{{" }}.app.metadata.name{{ "}}" }} 상태 이상",
              "description": "Health: {{ "{{" }}.app.status.health.status{{ "}}" }}",
              "color": 16744448
            {{ "}" }}]
          }

  trigger.on-sync-running: |
    - when: app.status.operationState.phase in ['Running']
      send: [app-sync-running]

  trigger.on-sync-succeeded: |
    - when: app.status.operationState.phase in ['Succeeded']
      send: [app-sync-succeeded]

  trigger.on-sync-failed: |
    - when: app.status.operationState.phase in ['Error', 'Failed']
      send: [app-sync-failed]

  trigger.on-health-degraded: |
    - when: app.status.health.status == 'Degraded'
      send: [app-health-degraded]
