kube-prometheus-stack:
  prometheus:
    service:
      type: NodePort
      nodePort: 30090
    thanosService:
      enabled: true
    prometheusSpec:
      enableFeatures:
        - exemplar-storage
      retention: 7d
      thanos:
        objectStorageConfig:
          existingSecret:
            name: thanos-objstore-secret
            key: objstore.yml
      resources:
        requests:
          cpu: 200m
          memory: 512Mi
        limits:
          cpu: "1"
          memory: 2Gi
      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: longhorn
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 20Gi
      serviceMonitorSelectorNilUsesHelmValues: false
      podMonitorSelectorNilUsesHelmValues: false

  coreDns:
    enabled: false
  kubeEtcd:
    enabled: false
  kubeApiServer:
    enabled: false
  kubeControllerManager:
    enabled: false
  kubelet:
    enabled: true

  grafana:
    adminPassword: admin
    defaultDashboardsEnabled: false
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    service:
      type: NodePort
      nodePort: 30300
    persistence:
      enabled: true
      storageClassName: longhorn
      size: 5Gi
    additionalDataSources:
      - name: Loki
        type: loki
        uid: loki
        url: http://loki.monitoring.svc.cluster.local:3100
        access: proxy
        isDefault: false
        jsonData:
          derivedFields:
            - name: traceId
              matcherRegex: '"traceId":"([a-f0-9]+)"'
              url: "$${__value.raw}"
              datasourceUid: tempo
              urlDisplayLabel: Tempo
      - name: Thanos
        type: prometheus
        url: http://thanos-query.monitoring.svc.cluster.local:9090
        access: proxy
        isDefault: false
        jsonData:
          exemplarTraceIdDestinations:
            - name: traceID
              datasourceUid: tempo
      - name: Tempo
        type: tempo
        uid: tempo
        url: http://tempo.monitoring.svc.cluster.local:3100
        access: proxy
        isDefault: false
        jsonData:
          tracesToLogsV2:
            datasourceUid: loki
            filterByTraceID: true
            tags:
              - key: namespace
              - key: pod
          nodeGraph:
            enabled: true
          serviceMap:
            datasourceUid: prometheus

  alertmanager:
    config:
      global:
        resolve_timeout: 5m
      route:
        receiver: discord
        group_by:
          - alertname
          - namespace
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 4h
        routes:
          - receiver: discord
            matchers:
              - severity=~"critical|warning"
      receivers:
        - name: discord
          discord_configs:
            - webhook_url_file: /etc/alertmanager/secrets/alertmanager-discord-secret/DISCORD_WEBHOOK_URL
    alertmanagerSpec:
      secrets:
        - alertmanager-discord-secret
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 256Mi
      storage:
        volumeClaimTemplate:
          spec:
            storageClassName: longhorn
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 5Gi

  kube-state-metrics:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi

  prometheus-node-exporter:
    resources:
      requests:
        cpu: 50m
        memory: 32Mi
      limits:
        cpu: 200m
        memory: 128Mi
