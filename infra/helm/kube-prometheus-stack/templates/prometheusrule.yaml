apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: orino-alerts
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  groups:
    - name: pod-alerts
      rules:
        - alert: PodCrashLoopBackOff
          expr: rate(kube_pod_container_status_restarts_total[10m]) * 60 * 5 > 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Pod {{ "{{" }} $labels.namespace {{ "}}" }}/{{ "{{" }} $labels.pod {{ "}}" }} CrashLoopBackOff"
            description: "Pod {{ "{{" }} $labels.pod {{ "}}" }}이 5분간 반복 재시작 중"

        - alert: PodOOMKilled
          expr: kube_pod_container_status_last_terminated_reason{reason="OOMKilled"} == 1
          for: 0m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ "{{" }} $labels.namespace {{ "}}" }}/{{ "{{" }} $labels.pod {{ "}}" }} OOMKilled"
            description: "컨테이너 {{ "{{" }} $labels.container {{ "}}" }}이 메모리 부족으로 종료됨"

        - alert: PodNotReady
          expr: kube_pod_status_ready{condition="true"} == 0
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ "{{" }} $labels.namespace {{ "}}" }}/{{ "{{" }} $labels.pod {{ "}}" }} Not Ready"
            description: "Pod가 10분 이상 Ready 상태가 아님"

        - alert: ContainerMemoryNearLimit
          expr: container_memory_working_set_bytes{container!=""} / on(namespace, pod, container) kube_pod_container_resource_limits{resource="memory"} * 100 > 90
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "{{ "{{" }} $labels.namespace {{ "}}" }}/{{ "{{" }} $labels.pod {{ "}}" }} 메모리 limit 근접"
            description: "컨테이너 {{ "{{" }} $labels.container {{ "}}" }}이 메모리 limit의 {{ "{{" }} $value | printf \"%.0f\" {{ "}}" }}% 사용 중 (OOMKilled 위험)"

        - alert: DeploymentReplicasMismatch
          expr: kube_deployment_spec_replicas != kube_deployment_status_ready_replicas
          for: 10m
          labels:
            severity: critical
          annotations:
            summary: "{{ "{{" }} $labels.namespace {{ "}}" }}/{{ "{{" }} $labels.deployment {{ "}}" }} replica 불일치"
            description: "Deployment {{ "{{" }} $labels.deployment {{ "}}" }}의 Ready replica가 10분 이상 원하는 수와 불일치"

    - name: node-alerts
      rules:
        - alert: NodeNotReady
          expr: kube_node_status_condition{condition="Ready",status="true"} == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "노드 {{ "{{" }} $labels.node {{ "}}" }} Not Ready"
            description: "노드가 5분 이상 Ready 상태가 아님"

        - alert: NodeHighCpuUsage
          expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "노드 {{ "{{" }} $labels.instance {{ "}}" }} CPU 사용률 높음"
            description: "CPU 사용률이 10분간 85% 초과 (현재: {{ "{{" }} $value | printf \"%.1f\" {{ "}}" }}%)"

        - alert: NodeHighMemoryUsage
          expr: (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100 > 85
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "노드 {{ "{{" }} $labels.instance {{ "}}" }} 메모리 사용률 높음"
            description: "메모리 사용률이 10분간 85% 초과 (현재: {{ "{{" }} $value | printf \"%.1f\" {{ "}}" }}%)"

        - alert: NodeDiskSpaceLow
          expr: (1 - node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"} / node_filesystem_size_bytes) * 100 > 85
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "노드 {{ "{{" }} $labels.instance {{ "}}" }} 디스크 사용률 높음"
            description: "디스크 사용률이 85% 초과 (현재: {{ "{{" }} $value | printf \"%.1f\" {{ "}}" }}%)"

    - name: longhorn-alerts
      rules:
        - alert: LonghornBackupFailed
          expr: longhorn_backup_state{backup_state="Error"} == 1
          for: 0m
          labels:
            severity: critical
          annotations:
            summary: "Longhorn 백업 실패: {{ "{{" }} $labels.volume {{ "}}" }}"
            description: "볼륨 {{ "{{" }} $labels.volume {{ "}}" }}의 백업이 실패함"

        - alert: LonghornVolumeDegrade
          expr: longhorn_volume_robustness{robustness="degraded"} == 1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Longhorn 볼륨 Degraded: {{ "{{" }} $labels.volume {{ "}}" }}"
            description: "볼륨 {{ "{{" }} $labels.volume {{ "}}" }}이 Degraded 상태"

    - name: app-alerts
      rules:
        - alert: BackendDown
          expr: absent(kube_pod_status_ready{namespace="orino", pod=~"be-.*", condition="true"} == 1)
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "BE 서비스 다운"
            description: "BE Pod가 1분 이상 Ready 상태가 아님"

        - alert: FrontendDown
          expr: absent(kube_pod_status_ready{namespace="orino", pod=~"fe-.*", condition="true"} == 1)
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "FE 서비스 다운"
            description: "FE Pod가 1분 이상 Ready 상태가 아님"

        - alert: MysqlDown
          expr: absent(kube_pod_status_ready{namespace="orino", pod=~"mysql-.*", condition="true"} == 1)
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "MySQL 다운"
            description: "MySQL Pod가 Ready 상태가 아님"

        - alert: RedisDown
          expr: absent(kube_pod_status_ready{namespace="orino", pod=~"redis-.*", condition="true"} == 1)
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "Redis 다운"
            description: "Redis Pod가 Ready 상태가 아님"

    - name: storage-alerts
      rules:
        - alert: PvcUsageHigh
          expr: kubelet_volume_stats_used_bytes / kubelet_volume_stats_capacity_bytes * 100 > 80
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "PVC {{ "{{" }} $labels.namespace {{ "}}" }}/{{ "{{" }} $labels.persistentvolumeclaim {{ "}}" }} 용량 부족"
            description: "PVC 사용률 {{ "{{" }} $value | printf \"%.0f\" {{ "}}" }}% (80% 초과)"

    - name: app-metrics
      rules:
        - alert: BackendHighErrorRate
          expr: |
            sum(rate(http_server_requests_seconds_count{namespace="orino",status=~"5.."}[5m]))
              / sum(rate(http_server_requests_seconds_count{namespace="orino"}[5m])) > 0.05
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "BE 5xx 에러율 높음"
            description: "BE 5xx 비율이 5분간 5% 초과 (현재: {{ "{{" }} $value | printf \"%.2f\" {{ "}}" }})"

        - alert: BackendJvmHeapHigh
          expr: |
            sum(jvm_memory_used_bytes{namespace="orino",area="heap"})
              / sum(jvm_memory_max_bytes{namespace="orino",area="heap"}) > 0.85
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "BE JVM heap 사용률 높음"
            description: "JVM heap 사용률 10분간 85% 초과 (현재: {{ "{{" }} $value | printf \"%.2f\" {{ "}}" }})"

        - alert: BackendDbPoolExhausted
          expr: |
            max(hikaricp_connections_active{namespace="orino"})
              / max(hikaricp_connections_max{namespace="orino"}) > 0.9
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "BE DB 커넥션 풀 고갈 임박"
            description: "HikariCP active / max 비율이 5분간 90% 초과 (현재: {{ "{{" }} $value | printf \"%.2f\" {{ "}}" }})"

    - name: istio
      rules:
        - alert: IstioServiceErrorRateHigh
          expr: |
            sum by (destination_service) (rate(istio_requests_total{reporter="destination",response_code=~"5.."}[5m]))
              / sum by (destination_service) (rate(istio_requests_total{reporter="destination"}[5m])) > 0.05
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Istio 서비스 5xx 비율 높음: {{ "{{" }} $labels.destination_service {{ "}}" }}"
            description: "destination 5xx 비율이 5분간 5% 초과 (현재: {{ "{{" }} $value | printf \"%.2f\" {{ "}}" }})"

        - alert: IstioServiceLatencyP99High
          expr: |
            histogram_quantile(0.99,
              sum by (destination_service, le) (rate(istio_request_duration_milliseconds_bucket{reporter="destination"}[5m]))
            ) > 2000
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Istio 서비스 p99 지연 높음: {{ "{{" }} $labels.destination_service {{ "}}" }}"
            description: "p99 레이턴시가 10분간 2초 초과 (현재: {{ "{{" }} $value | printf \"%.0f\" {{ "}}" }}ms)"

    - name: observability-self
      rules:
        - alert: PrometheusDown
          expr: absent(kube_pod_status_ready{namespace="monitoring", pod=~"prometheus-kube-prometheus-stack-prometheus-.*", condition="true"} == 1)
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "Prometheus 다운"
            description: "Prometheus Pod가 1분 이상 Ready 상태가 아님"

        - alert: LokiDown
          expr: absent(kube_pod_status_ready{namespace="monitoring", pod=~"loki-.*", condition="true"} == 1)
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "Loki 다운"
            description: "Loki Pod가 1분 이상 Ready 상태가 아님"

        - alert: TempoDown
          expr: absent(kube_pod_status_ready{namespace="monitoring", pod=~"tempo-.*", condition="true"} == 1)
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "Tempo 다운"
            description: "Tempo Pod가 1분 이상 Ready 상태가 아님"

        - alert: AlloyDown
          expr: absent(kube_pod_status_ready{namespace="monitoring", pod=~"alloy-.*", condition="true"} == 1)
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "Alloy 다운"
            description: "Alloy Pod가 1분 이상 Ready 상태가 아님"

        - alert: ScrapeTargetDown
          expr: up == 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Prometheus scrape target 다운: {{ "{{" }} $labels.job {{ "}}" }}/{{ "{{" }} $labels.instance {{ "}}" }}"
            description: "scrape target이 5분 이상 up=0 상태"
