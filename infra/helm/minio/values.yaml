minio:
  mode: standalone

  existingSecret: minio-secret

  # RWO PVC(longhorn) 단일 replica 구성이므로 Recreate로 롤아웃 교착 방지
  # - maxSurge 100% + RWO 조합은 Multi-Attach error로 롤아웃이 멈춘다
  deploymentUpdate:
    type: Recreate

  persistence:
    enabled: true
    storageClass: longhorn
    size: 20Gi

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  service:
    type: NodePort
    nodePort: 30900

  consoleService:
    type: NodePort
    nodePort: 30901

  buckets:
    - name: orino
      policy: none
      purge: false
