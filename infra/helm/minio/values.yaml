minio:
  mode: standalone

  existingSecret: minio-secret

  persistence:
    enabled: true
    storageClass: longhorn
    size: 20Gi

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  service:
    type: NodePort
    nodePort: 30900

  consoleService:
    type: NodePort
    nodePort: 30901

  buckets:
    - name: orino
      policy: none
      purge: false
