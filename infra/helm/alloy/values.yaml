alloy:
  alloy:
    configMap:
      content: |
        // ========================
        // OTLP 수신 (gRPC/HTTP)
        // ========================
        otelcol.receiver.otlp "default" {
          grpc {
            endpoint = "0.0.0.0:4317"
          }
          http {
            endpoint = "0.0.0.0:4318"
          }
          output {
            traces  = [otelcol.exporter.otlp.tempo.input]
          }
        }

        // Traces → Tempo
        otelcol.exporter.otlp "tempo" {
          client {
            endpoint = "tempo.monitoring.svc.cluster.local:4317"
            tls {
              insecure = true
            }
          }
        }

        // ========================
        // Faro receiver (FE 텔레메트리 수신)
        // ========================
        faro.receiver "app_receiver" {
          server {
            listen_address           = "0.0.0.0"
            listen_port              = 12347
            cors_allowed_origins     = ["https://orino.dev"]
            api_key                  = sys.env("FARO_API_KEY")
            max_allowed_payload_size = "10MiB"
            rate_limiting {
              rate = 100
            }
          }

          output {
            logs   = [loki.process.faro.receiver]
            traces = [otelcol.exporter.otlp.tempo.input]
          }
        }

        // Faro 로그 전용 파이프라인: logfmt 파싱 후 app/kind를 스트림 라벨로 승격
        // 나머지 필드(session_id, trace_id, view_name 등)는 high-cardinality이므로 로그 내용에만 남김
        loki.process "faro" {
          stage.logfmt {
            mapping = {
              app  = "app_name",
              kind = "",
            }
          }

          stage.labels {
            values = {
              app  = "",
              kind = "",
            }
          }

          forward_to = [loki.write.default.receiver]
        }

        // ========================
        // Kubernetes Pod 로그 수집
        // ========================
        discovery.kubernetes "pods" {
          role = "pod"
        }

        discovery.relabel "pods" {
          targets = discovery.kubernetes.pods.targets

          // namespace 라벨
          rule {
            source_labels = ["__meta_kubernetes_namespace"]
            target_label  = "namespace"
          }

          // pod 이름 라벨
          rule {
            source_labels = ["__meta_kubernetes_pod_name"]
            target_label  = "pod"
          }

          // 컨테이너 이름 라벨
          rule {
            source_labels = ["__meta_kubernetes_pod_container_name"]
            target_label  = "container"
          }

          // app 라벨
          rule {
            source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
            target_label  = "app"
          }

          // 로그 경로
          rule {
            source_labels = ["__meta_kubernetes_pod_uid", "__meta_kubernetes_pod_container_name"]
            separator     = "/"
            target_label  = "__path__"
            replacement   = "/var/log/pods/*$1/$2/*.log"
          }
        }

        loki.source.kubernetes "pods" {
          targets    = discovery.relabel.pods.output
          forward_to = [loki.process.json_parse.receiver]
        }

        // JSON 로그 파싱 (BE prod 로그: LogstashEncoder)
        loki.process "json_parse" {
          stage.json {
            expressions = {
              level      = "level",
              logger     = "logger_name",
              request_id = "requestId",
              user_id    = "userId",
              trace_id   = "traceId",
            }
          }

          stage.labels {
            values = {
              level = "",
            }
          }

          forward_to = [loki.write.default.receiver]
        }

        // Loki로 전송
        loki.write "default" {
          endpoint {
            url = "http://loki.monitoring.svc.cluster.local:3100/loki/api/v1/push"
          }
        }

    # FARO_API_KEY 환경변수 주입 (alloy-faro-secret)
    envFrom:
      - secretRef:
          name: alloy-faro-secret

    extraPorts:
      - name: otlp-grpc
        port: 4317
        targetPort: 4317
        protocol: TCP
      - name: otlp-http
        port: 4318
        targetPort: 4318
        protocol: TCP
      - name: faro
        port: 12347
        targetPort: 12347
        protocol: TCP

  controller:
    type: daemonset

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi
